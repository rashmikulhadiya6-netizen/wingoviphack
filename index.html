<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo VIP Hack</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; text-align: center; margin: 0; }
        .header { padding: 15px; border-bottom: 2px solid #0f0; background: #050505; }
        .balance-card { background: #111; margin: 10px; padding: 10px; border: 1px solid #333; color: #fff; }
        .hack-box { border: 2px solid #0f0; margin: 20px; padding: 20px; border-radius: 15px; background: #080808; }
        .locked { filter: blur(10px); pointer-events: none; user-select: none; }
        .btn-unlock { background: #0f0; color: #000; border: none; padding: 12px 25px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 15px; }
        .footer { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; border-top: 1px solid #333; }
        .nav-item { flex: 1; padding: 15px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header"><h2 style="margin:0; color:#0f0;">UNIX VIP HACK</h2></div>
    <div class="balance-card">CURRENT BALANCE: <span id="balance">0</span> CR</div>
    <div class="hack-box">
        <p>PERIOD: <span id="period">2026031901</span></p>
        <p>TIMER: <span id="timer">00:59</span></p>
        <hr style="border:0.5px solid #222;">
        <div id="prediction" class="locked"><h1>BIG - RED</h1></div>
        <div id="lock-msg" style="color:#ff0000;">🔒 Prediction Locked</div>
        <button class="btn-unlock" onclick="unlock()">UNLOCK (₹10)</button>
    </div>
    <div class="footer"><a href="#" class="nav-item">HOME</a><a href="#" class="nav-item">ACCOUNT</a></div>
    <script>
        let balance = 0; 
        function unlock() {
            if (balance >= 10) {
                balance -= 10;
                document.getElementById('balance').innerText = balance;
                document.getElementById('prediction').classList.remove('locked');
                document.getElementById('lock-msg').style.display = 'none';
                alert("₹10 Deducted Successfully!");
            } else {
                alert("Insufficient Balance! Please Recharge from Account.");
            }
        }
        setInterval(() => {
            let sec = new Date().getSeconds();
            let remain = 60 - sec;
            document.getElementById('timer').innerText = "00:" + (remain < 10 ? "0" + remain : remain);
        }, 1000);
    </script>
</body>
</html>
